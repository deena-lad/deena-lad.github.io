title: "Deena Lad | ML Research Engineer"
description: "M.Tech Gold Medalist & ML Research Engineer — Spatio-Temporal AI, Climate ML, Scientific ML. Open to applied ML roles in quantitative finance and space-tech."
url: "https://deena-lad.github.io"
baseurl: ""

author:
  name: "Deena Lad"
  email: "deenalad06@gmail.com"
  linkedin: "https://www.linkedin.com/in/deena-lad-307645214/"
  github: "https://github.com/deena-lad"
  phone: "+91-9106773581"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    block:
      line_numbers: true
  math_engine: mathjax

mathjax: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Deena Lad"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - README.md